<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Вход — ZetTechAvio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background:#f7f9fb; margin:0; color:#1f2937; }
    .container { max-width:420px; margin:80px auto; padding:24px; }
    .card { background:#fff; padding:20px; border-radius:12px; box-shadow:0 8px 24px rgba(10,23,54,0.06); }
    h2 { margin:0 0 12px; font-size:22px; }
    label { display:block; font-size:13px; margin-top:12px; color:#6b7280; }
    input[type="email"], input[type="password"] {
      width:100%; padding:10px 12px; margin-top:6px; border-radius:8px; border:1px solid #e6e9ee;
      box-sizing:border-box; font-size:15px;
    }
    .btn { margin-top:16px; display:inline-block; padding:10px 14px; background:#0A75FF; color:#fff;
      border-radius:8px; border:none; cursor:pointer; text-decoration:none; text-align:center; }
    .muted { margin-top:12px; color:#6b7280; font-size:13px; }
    .link { color:#0A75FF; text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Вход в аккаунт</h2>
      <form action="#" method="post" onsubmit="event.preventDefault(); alert('Здесь будет логика входа — сейчас демо');">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required>
        <label for="password">Пароль</label>
        <input id="password" type="password" placeholder="Введите пароль" required>
        <button class="btn" type="submit">Войти</button>
      </form>
      <div class="muted">Нет аккаунта? <a class="link" href="register.html">Зарегистрироваться</a></div>
      <div style="margin-top:8px"><a class="link" href="index.html">← Вернуться на главную</a></div>
    </div>
  </div>
</body>
</html>
