<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — ZetTechAvio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Inter',sans-serif;background:#fff;margin:0;color:#1f2937}
  .container{max-width:1000px;margin:20px auto;padding:16px}
  .card{background:#fff;padding:12px;border-radius:10px;box-shadow:0 8px 24px rgba(10,23,54,0.06)}

  th,td{padding:8px;border-bottom:1px solid #eef2f6}
  .role{padding:6px 8px;border-radius:6px;background:#eef6ff;color:#0a5fcc}
</style>
</head>
<body>
  <div class="container">
    <h2>Администрирование — Пользователи</h2>
    <div class="card">
      <table>
        <thead><tr><th>Email</th><th>Имя</th><th>Роль</th><th>Действия</th></tr></thead>
        <tbody>
          <tr><td>manager@zettech</td><td>Мария</td><td><span class="role">manager</span></td><td><button onclick="alert('Изменить роль')">Изменить</button></td></tr>
          <tr><td>user@zettech</td><td>Иван</td><td><span class="role">user</span></td><td><button onclick="alert('Изменить роль')">Изменить</button></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
