name: Build & Deploy ZetTechAvio

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Скачать код
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # 2. Подготовить Docker Buildx (для сборки на разных платформах)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 3. Залогиниться в GitHub Container Registry
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # 4. Собрать React приложение
      - name: Build React App
        run: |
          cd ./project/frontend
          npm ci
          CI=false npm run build
          cd ../..
      
      # 5. Собрать и запушить Backend образ
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./project/ZetTechAvio1.0
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zettechavio-backend:latest
            ghcr.io/${{ github.repository_owner }}/zettechavio-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/zettechavio-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/zettechavio-backend:buildcache,mode=max
      
      # 6. Собрать и запушить Frontend образ
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./project/frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zettechavio-frontend:latest
            ghcr.io/${{ github.repository_owner }}/zettechavio-frontend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/zettechavio-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/zettechavio-frontend:buildcache,mode=max
      
      # 7. SSH деплой на VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.DOCKER_UP }}
          port: 22
          timeout: 30m
          script: |
            cd /root/ZetTechAvio
            
            # Обновить Docker образы из registry
            echo "Pulling latest images from ghcr.io..."
            docker compose pull
            
            # Перезагрузить контейнеры с новыми образами
            echo "Restarting containers..."
            docker compose up -d
            
            # Проверить статус
            echo "Checking status..."
            docker compose ps
            
            # Показать логи последних 20 строк
            echo "Recent logs:"
            docker compose logs --tail=20
