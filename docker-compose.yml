
version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: zettechavio-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./zettechavio.sql:/docker-entrypoint-initdb.d/zettechavio.sql
    networks:
      - zettechavio-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    image: ghcr.io/loweeppp/zettechavio-backend:latest
    container_name: zettechavio-backend
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: "Server=mysql;Database=${MYSQL_DATABASE};User=root;Password=${DB_PASSWORD};SslMode=none;"
      HttpClient__BaseAddress: ${HttpClient__BaseAddress}
      Cors__AllowedOrigins: ${Cors__AllowedOrigins}
      Urls: ${Urls}
      JWT_SECRET: ${JWT_SECRET}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_API_KEY: ${YOOKASSA_API_KEY}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5151:5151"
    networks:
      - zettechavio-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/loweeppp/zettechavio-frontend:latest
    container_name: zettechavio-frontend
    ports:
      - "3000:80"
    networks:
      - zettechavio-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: zettechavio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - zettechavio-network
    restart: unless-stopped

networks:
  zettechavio-network:
    driver: bridge

volumes:
  mysql_data:
